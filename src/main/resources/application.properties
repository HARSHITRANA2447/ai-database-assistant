# ============================================================
# AI Database Assistant - Application Configuration
# ============================================================
spring.application.name=AI Database Assistant

# ============================================================
# H2 File-Based Database (data persists across restarts)
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/aidbassistant;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ============================================================
# AI Provider ? Groq (FREE, no credit card needed)
# Get your free key at: https://console.groq.com
# ============================================================
ai.provider=groq
ai.api.key=API_KEY_FROM_GROQ
ai.groq.model=llama-3.3-70b-versatile

# ?? Ollama fallback (completely free, local) ????????????????
# ai.provider=ollama
ai.ollama.url=http://localhost:11434
ai.ollama.model=llama3

# ?? Anthropic (paid, best quality) ?????????????????????????
# ai.provider=anthropic
# ai.api.key=YOUR_ANTHROPIC_KEY
# ai.model=claude-sonnet-4-20250514

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
csv.upload.dir=./uploads

# ============================================================
# Server & Thymeleaf
# ============================================================
server.port=8080
server.error.include-message=always
spring.thymeleaf.cache=false

# ============================================================
# Logging
# ============================================================
logging.level.com.aidb=INFO
logging.level.org.springframework.security=WARN
