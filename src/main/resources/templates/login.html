<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI DB Assistant - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display:flex; align-items:center; }
        .login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; }
        .brand-icon { font-size: 3rem; background: linear-gradient(135deg, #6c63ff, #3ecf8e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-control { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 10px; }
        .form-control:focus { background: rgba(255,255,255,0.12); border-color: #6c63ff; color: #fff; box-shadow: 0 0 0 3px rgba(108,99,255,0.2); }
        .btn-primary { background: linear-gradient(135deg, #6c63ff, #3ecf8e); border: none; border-radius: 10px; padding: 12px; font-weight: 600; }
        .demo-badge { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 12px; font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="login-card text-white text-center">
                <div class="brand-icon mb-3"><i class="fas fa-database"></i></div>
                <h2 class="fw-bold mb-1">AI DB Assistant</h2>
                <p class="text-muted mb-4">Talk to your database in plain English</p>

                <div th:if="${param.error}" class="alert alert-danger alert-sm py-2">Invalid credentials. Try again.</div>
                <div th:if="${param.logout}" class="alert alert-success alert-sm py-2">Logged out successfully.</div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3 text-start">
                        <label class="form-label text-muted">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label text-muted">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                </form>

                <div class="mt-3">
                    <p class="text-muted mb-2" style="font-size:0.85rem">Demo Credentials</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <span class="demo-badge"><b>admin</b> / admin123 <span class="badge bg-warning text-dark ms-1">ADMIN</span></span>
                        <span class="demo-badge"><b>user</b> / user123</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
