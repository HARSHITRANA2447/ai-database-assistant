<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - AI DB Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #6c63ff; --accent2: #3ecf8e; --bg: #0d0d1a; --surface: #12121f; --surface2: #1a1a2e; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; }
        .brand { font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .content { padding: 24px; max-width: 1200px; margin: auto; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .stat-num { font-size: 2rem; font-weight: 700; }
        .card-dark { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .card-header-dark { padding: 14px 20px; border-bottom: 1px solid var(--border); font-weight: 600; color: #ccc; font-size: 0.9rem; }
        .table-dark-custom { color: #bbb; font-size: 0.83rem; }
        .table-dark-custom th { color: var(--accent); font-weight: 600; background: rgba(108,99,255,0.08); border-color: var(--border); }
        .table-dark-custom td { border-color: var(--border); vertical-align: middle; }
        .status-badge { padding: 3px 8px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
        .status-SUCCESS { background: rgba(62,207,142,0.15); color: var(--accent2); }
        .status-FAILED { background: rgba(255,107,107,0.15); color: #ff8080; }
        .status-BLOCKED { background: rgba(255,193,7,0.15); color: #ffc107; }
        .schema-table-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
        .col-chip { display: inline-block; background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.2); color: #b0acff; border-radius: 4px; padding: 2px 7px; font-size: 0.74rem; margin: 2px; }
    </style>
</head>
<body>
<nav class="navbar d-flex justify-content-between">
    <div class="d-flex align-items-center gap-3">
        <i class="fas fa-database" style="color: var(--accent)"></i>
        <span class="brand">AI DB Assistant</span>
        <span style="color:#555; font-size:0.85rem">/ Admin Dashboard</span>
    </div>
    <div class="d-flex gap-2">
        <a href="/chat" class="btn btn-sm" style="background:rgba(108,99,255,0.15);color:var(--accent);border:1px solid rgba(108,99,255,0.3);border-radius:8px;font-size:0.8rem;text-decoration:none;padding:5px 12px">
            <i class="fas fa-comments me-1"></i>Chat
        </a>
        <a href="/logout" class="btn btn-sm" style="background:rgba(255,107,107,0.1);color:#ff8080;border:1px solid rgba(255,107,107,0.2);border-radius:8px;font-size:0.8rem;text-decoration:none;padding:5px 12px">
            <i class="fas fa-sign-out-alt me-1"></i>Logout
        </a>
    </div>
</nav>

<div class="content">
    <h5 style="color:#ccc; margin-bottom:20px"><i class="fas fa-tachometer-alt me-2" style="color:var(--accent)"></i>Dashboard Overview</h5>

    <!-- Stats Row -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background: rgba(108,99,255,0.15)"><i class="fas fa-database" style="color:var(--accent)"></i></div>
                    <div>
                        <div class="text-muted" style="font-size:0.78rem">Total Queries</div>
                        <div class="stat-num" style="color:var(--accent)" th:text="${totalQueries}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background: rgba(62,207,142,0.15)"><i class="fas fa-check-circle" style="color:var(--accent2)"></i></div>
                    <div>
                        <div class="text-muted" style="font-size:0.78rem">Tables Available</div>
                        <div class="stat-num" style="color:var(--accent2)" th:text="${schemaInfo != null ? schemaInfo.size() : 0}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background: rgba(255,209,102,0.15)"><i class="fas fa-users" style="color:#ffd166"></i></div>
                    <div>
                        <div class="text-muted" style="font-size:0.78rem">AI Provider</div>
                        <div style="font-size:1rem; font-weight:700; color:#ffd166">Anthropic</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background: rgba(6,214,160,0.15)"><i class="fas fa-shield-alt" style="color:#06d6a0"></i></div>
                    <div>
                        <div class="text-muted" style="font-size:0.78rem">Security</div>
                        <div style="font-size:1rem; font-weight:700; color:#06d6a0">SELECT Only</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <!-- Query History -->
        <div class="col-lg-8">
            <div class="card-dark">
                <div class="card-header-dark"><i class="fas fa-history me-2" style="color:var(--accent)"></i>Recent Query History</div>
                <div style="overflow-x:auto; max-height:420px; overflow-y:auto;">
                    <table class="table table-dark-custom mb-0">
                        <thead>
                            <tr><th>User</th><th>Query</th><th>Status</th><th>Rows</th><th>Time(ms)</th><th>When</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="q : ${recentQueries}">
                                <td><span style="color:#888" th:text="${q.username}"></span></td>
                                <td style="max-width:220px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis" th:text="${q.userQuery}"></td>
                                <td><span class="status-badge" th:classappend="'status-' + ${q.executionStatus}" th:text="${q.executionStatus}"></span></td>
                                <td th:text="${q.rowCount != null ? q.rowCount : '-'}"></td>
                                <td th:text="${q.executionTimeMs != null ? q.executionTimeMs : '-'}"></td>
                                <td style="color:#555; white-space:nowrap" th:text="${#temporals.format(q.timestamp, 'dd MMM HH:mm')}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(recentQueries)}">
                                <td colspan="6" class="text-center text-muted py-4">No queries yet. Go ask something!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Schema Info -->
        <div class="col-lg-4">
            <div class="card-dark">
                <div class="card-header-dark"><i class="fas fa-table me-2" style="color:var(--accent)"></i>Database Schema</div>
                <div style="padding:14px; max-height:420px; overflow-y:auto;">
                    <div th:each="table : ${schemaInfo}" class="schema-table-card">
                        <div style="color:var(--accent); font-weight:600; font-size:0.85rem; margin-bottom:8px">
                            <i class="fas fa-table me-2"></i><span th:text="${table.tableName}"></span>
                        </div>
                        <div th:each="col : ${table.columns}">
                            <span class="col-chip"><span th:text="${col.name}"></span> <span style="color:#555" th:text="${col.type}"></span></span>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(schemaInfo)}" class="text-muted text-center py-3">No tables found.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
